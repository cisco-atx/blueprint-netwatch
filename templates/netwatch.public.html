<!DOCTYPE html>
<html lang="en" data-theme="{{ session.get('userdata', {}).get('theme', 'light') }}">

<head>
    <meta charset="UTF-8">
    <title>ATX</title>

    <link rel="icon" href="{{ url_for('static', filename='img/cisco.svg') }}" type="image/x-icon">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.5/css/jquery.dataTables.min.css"/>
    <link rel="stylesheet" id="stylesheet" href="{{ url_for('static', filename='css/common.css') }}">
    <link rel="stylesheet" id="theme-stylesheet" href="{{ url_for('netwatch.static', filename='css/common.css') }}">

    <style>
        .material-icons {
          opacity: 1;
        }
    </style>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.5/js/jquery.dataTables.min.js"></script>
    <script src="{{ url_for('netwatch.static', filename='js/netwatch.public.js') }}"></script>

    <script>
        const WATCHER_ID = "{{ watcher_id }}";
    </script>
</head>

<body>
<main id="mainLayout">
    <div class="content" id="mainLayoutContent">
        <div class="netwatch-status-bar">
            <div style="font-weight: 600;">Status:</div>

            <span id="statusBadge" class="badge info">
                Init
            </span>

            <span id="statusText" style="margin-left: auto;">
                Initializing watcher...
            </span>

        </div>

        <div class="netwatch-table-container" id="tableContainer" style="height:100%;">

            <!-- Empty / Initial State -->
            <div id="tableEmptyState" class="table-overlay">
                <span class="material-icons" style="font-size: 36px;">info</span>
                <div>No data yet</div>
            </div>

            <!-- Loading State -->
            <div id="tableLoadingState" class="table-overlay" style="display:none;">
                <span class="material-icons spin" style="font-size: 36px;">autorenew</span>
                <div>Starting watcher...</div>
            </div>

            <table id="watchTable" class="display" style="width:100%">
                <thead></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</main>
</body>
</html>

<div id="pinModal" class="simple-modal-overlay" style="display:flex;">
    <div class="simple-modal-container" style="width: 400px;">

        <div class="simple-modal-header">
            <div class="simple-modal-title">
                Access to Watcher "{{ watcher_id }}"
            </div>
        </div>

        <div class="simple-modal-body">
            <div style="display:flex; flex-direction:column; gap:10px;">
                <input id="pinInput" type="text" maxlength="4" placeholder="Enter 4-digit PIN">
            </div>
        </div>

        <div class="simple-modal-footer">
            <button onclick="submitPin()">Connect</button>
        </div>
    </div>
</div>
